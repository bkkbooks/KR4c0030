body:
  text: 宗𤣥集卷中唐吴筠撰思還淳賦伊太素之𤣥風迨羲軒而浸隠雖朴散以成器暨唐虞而未冺淳化日以淪亡及殷周而殆盡唯挺生之尼父覩澆漓而致憫乃修詩書制禮樂以救崩隤將驅末駕以旋軫𤣥元適彼流沙遺道徳於關尹信文約而義賾俾浮競以返本固大運之推遷雖聖人亦不能扶其顛隕五霸既沒七雄交馳爰至暴秦儒殘道隳皇漢底定人懐輯熈孝文御宇所向無為刑法㡬措歡心秉彛孝武好夫征伐亦兼崇於典儀雖純懿未舉而文章載施元成懦弱政教陵遲彼蒼生息肩之日在世祖中興之時何孝明之匪徳為祅夢之所眩創戎神之祠宇遵恍惚之妄見始涓㳙於濫觴終浩瀚以流羨歴三國而猶㣲更五胡而大建華夏之禮廢邉荒之風扇沴氣悖以興行人心颯以傾變遂侮君親蔑彛憲髠跣貴簮裾賤事竭思以徼福劣含疑而懼譴上發跡於侯王下無勞於奬勸尊贔屭之金狄列峥嶸之紫殿伐千畆之竹不足紀荒唐寓言傾九府之財焉能充悃款誠願於是寶樹瓊軒凌雲照日鏗鍠窈窕不可談悉越章華之宏壯羅區宇而比櫛棟宇已來未有儔匹重貝葉訛謬輕先王典籍欽刑殘鄙夫宴廣廈精室使白屋終勞緇門永逸自國至家祈虚䘮實䖍而是者則紿之以嘉祥沮而非者則欺之以罪疚故中智已下助成其姦宄之術可謂至真隠大偽出所以㜸黨妖徒此焉遊息儲不因耕衣不俟織誘施冒貨鯨吞蠶食若蛟螭之在水猶豺豹之附翼罔不假小善以外慈藏深邪而内賊豈止一時之封豕乃為萬代之蟊蠈足使宵人得意而傲睨上士傷心而憫黙於戲天道乎人事歟天道逺而難曉人事近而可詳雖孽自天啟亦妖由人彰斯乃鍾劉石之兩羯偶苻姚之二羌憑􅆊書之恢譎資漢筆以闡揚道安討論於河洛恵逺潤色於江湘圗澄挾術以鼔舞羅什聚徒以張皇跡無徴於班馬理唯竊于老荘襃蠻陬為中土貶諸夏為偏方務乎在噬儒吞道抑帝掩王奪真宰之柄操元化之綱自古初以逮今未有若斯之弊逆天暴物干紀亂常爰自晉宋迄於齊梁靡不興之者滅廢之者昌竟流遁而不返終取悔以危亡者其故何哉盖蓼蟲忘辛習其久翫將助其理反増其亂若運窮數極則君悟臣斷億兆不謀而密移神祗應感而冥賛山川為之澄穆日月為之炳煥自然朝思文明野冀貞觀譬曽冰之堅積非陽春不能使之剖泮當是時也太上有命爰徴萬靈勅司姦以糺慝遣執法以詳刑五帝合符三官同征乃命天將總天丁伐天鼓揚天旌揮金鑲擲火鈴使列缺激迅霆出昭曠入杳冥捕無影搜無聲獲祅師殱氛兵正太階掃欃槍盪遺祅於千載流恵澤於八紘班師下土歸功上清然後人倫可以順化神道可以永真變訛僻之俗為雍睦之甿佇淳風之尅復吾乃鼓腹擊壤于岩坰吟詠柏皇與驪連大庭而已矣洗心賦嘗甄道以謀已考往哲之所經資忠孝與仁義保存殁之令名伊周功格於皇天孔墨道濟於生靈始崇崇於可久終寂寂而何成唯聞松喬之髙流超乎世表以永真意稟受之使然固脩鍊之所得奚稽疑以究理庻髣髴乎遺則斯乃御太易之祖先體虚和之宗極出變化之機範離隂陽之動息知成我者神賊我者人神符性以契道人應情以䘮真彼昭然而獨見乃蕭邈以殊倫故能積精㣲而顯著乗一氣以日新昔予感夫前修良反俗于壯齒捐區中之末駕騁方外之逸軌收當世之所遺賤時人之所偉俯滄海以淵淡仰赤霄以聳峙人耽厚味與美飾吾不知其所美也于是逺塵境棲雲岑潔其形清其心方冀覩杳冥之狀聞虚寂之音真人居髙以流恵正氣無逺而見尋鑒雙景之皎皎翼萬靈之森森瑩丹宫之神光潄玉池之靈液修五緯以飛奔蹈七元而縱歴陽晶煜以景萃隂滓渙而冰釋體因用而彌和心有存而轉寂味𤣥㫖以永日諷靈篇以自怡雖天路之遼夐庻通感而可期何逆醜之干紀集兵戈于洛師畏巢焚以鳥逝聿投跡於江湄憂虞匪遑於專静吾道於是乎中虧使清虚恬淡乖其致為垢濁喧囂之所欺遂荏苒以忘返將十年而迨兹惜流光之不駐鑒華髮以興悲噫嗟進有馳車升丘之難退有轉規入谷之易縈塵務以汩沒皆近習之所致徇人情之所取必神道之我棄理無往而不復思挺然以釋累洿可以洗濁可以澄俾疎惰之情廢則精勤之思興代甘芳以淳淡易浮蕩以虚凝合抱生於毫末履霜至於堅冰孰謂希夷之無物吾必知恍惚之可憑也乃復拂衣長林從其夙尚近宗仙經逺稟真匠機已忘而氣正戰復勝而神王庶斯道之可恒喜勿藥於無妄夫造物者結虚而為實致道者反麤而至精所以齊天地之悠逺叶日月之昭明哀衆人淪胥以徂謝吾方獨務於長生登真賦悟世促而道永知名疎而體親遂忘機而滅跡方錬骨而清神道不予欺兮感通象罔天必我鑒兮保合元真隂滓落而形超陽靈全而羽化惟九仙之奕奕降八景而來迓何霓旌之悠揚吾其整此霄駕持造化之系出存亡之表逺四野之冥冥近三辰之皎皎涉虚寥之浩曠覺宇宙之卑湫龍鸞竦兮升我於𤣥都流玉音於至寂散金光于太無星官後從雲將前驅使八威與六領盪遺祅於天衢麾百魔以震伏總萬靈以遊娱翠旄紛紛兮拂重霄而凌厲入閶闔之九闗過太微而一憩倚華盖而招真登紫庭而謁帝飲予以沆瀣樂予以𤣥鈞左盼夫鬱儀右瞻乎結璘信巍巍以蕩蕩肅肅而振振享讌斯徹遨嬉未已泛鶉河之廣流折鶱木之芳蘂靈香靄而八衝寶雲沓而四起諒兹境之足恱乃此情之匪留揚玉輪以逕進更冉冉而上浮控三氣而髙舉何萬夫之足越覲元始于玉晨謁虚皇于金闕真朋森而無算咸顧予以致恱於是凝而為有散而為宗見不以察聞不以聰視極於無際聽周於無窮動不因心飛不假翼與浩刼而靈長視萬春為一息或躋綺合之榭或宴圎華之房躡太漠之清迥弄明霞之焜煌仰瑤嶺之嵯峨俯碧津之湯湯羅絳樹之杳藹激神風之玲琅何至樂之靡極永逍遙以為常廬山雲液泉賦筠所居之東嶺其半側有泉洪纎如指冬夏若一山少凡石土多雲母其水色白味甘且清此則雲母滋液所致因名雲液之泉乃結宇其傍引於軒廡之下既飲既潄永翫不斁今兹夏季不雨至於十月江湖耗井澗涸此泉泠泠不減平昔懿其若是爰以作賦坤元孕氣潜暢成泉冠五行之首為萬物之先爰有漬流出此山側處䝉險而難知猶井渫之不食我搜靈泌載披載登見其地僻至潔源深有恒沍寒不為之増乃考室以飲而樂在枕肱存侔𤣥玉之膏得乃雲華之液疾可蠲生可益引充狎翫唯意所適懸之則皎素壅之則澄碧晝浮光以悠揚夜含響而淅瀝隂陽為災水旱失節不雨炎夏暨乎𤣥月汪汪洪波久已竭耿耿瀑布今亦絶挫江湖之浩蕩况澗谷之微劣斯泉秉彛毫纎無虧雖逺不霑恵而近有所滋彼漰霈於疇日豈不慙㳙㳙于此時夫醴泉無源而易涸丹溜乍見而難挹曷若平以為鑒酌焉取給何以神山之瀵帝臺之漿湧異域之表湛無人之鄉兹亦標奇于絶境真可謂靈而長也𤣥猿賦并序前者稱周穆王南征君子變為猿鶴小人變為蟲魚夫神用無方未必不爾筠自入廬嶽則覩斯𤣥猿嘉其雨昏則無聲景霽則長嘯不踐土石超遙於萬木之間春咀其英秋食其實不犯稼穡深棲逺處猶有君子之性異乎狙猱之倫且多難已來庻品凋敗麋鹿殫于網罟遺甿困于誅求此獨蕭然物莫能患豈不以託跡冥絶不才逺禍昔夫子歎山梁雌雉曰時哉時哉予固感之聊以作賦云耳伊𤣥猿之所育于南國之層岑動不踐地居常在林每泛泛而無㨿亦熈熈而有心雰嵐昏而共黙風雨霽而爭吟使幽人之思清暢羇客之涕霑襟何必聆嶰谷之管對雍門之琴哉歴千尋之喬木俯萬仭之危嶠弄遊雲之亂飛嬉落日之横照連肱澗飲命侣煙噍或聚而閒棲或分而迥趠夀同靈鶴性合君子阻重巖之險非虎豹所履䕃交柯之密豈鵰鶚能視故逄䝉操弓憚髙深而止鄧公折箭含惻隠而已何患累之罕臻不干物以利已詎若􅀈􅀈凌人以就戮猩猩甘酒而遄死夫時珍貂裘世寶狐白彼徒工於隠伏終見陷于機辟麝懷香以賈害狙伐巧而招射小則翡翠殞於羽毛大則犀象殘於齒革孰能去有用之損取無用之益因棄置於常情永逍遙以自適無威刑相臨以族類相親食資諸物衣取諸身不賦不役靡勞靡勤如正教之未施保巢居以淳淳匪虞氏之所及何狙公之能馴吾固知人為萬物之貴又焉測元化之所大均乎神仙可學論洪範嚮用五福其一曰夀延命至於期頥皇天猶以為景福之最况神仙度世永無窮乎然則長生大慶無等倫以儔擬當代之人忽而不尚何哉嘗試論之中智以下逮於庻民與飛走肖翹同其自生自死昧識所不及聞道則相與笑之中智已上為名教所檢區區於三綱五常不暇聞道而若存若亡能挺然竦身而不使常情汩没專以修鍊為務者千萬人中或一人而已又行之者密得之者隠故舉俗罕為其方悲夫昔桑矯問于㳙子曰自古有死復云有仙如之何㳙子曰兩有耳夫言兩有者為理無不存理無不存則神仙可學也嵇公言神仙特受異氣稟之自然非積學所能致此未必盡其端矣有不因修學而致者稟受異氣也有必待學而後成者功業充也有學而不得者初勤中墮誠不終也三者各有其㫖不可以一貫推之人生天地之中殊於衆類明矣感則應激則通所以耿恭援力平陸泉湧李廣發矢伏石飲羽精誠在於斯須擊猶土石應若影響况丹懇久著真君豈不為之潜運乎潜運則不死之階立致矣孰為真君則太上也為神明宗極獨在於窅冥之先髙居紫㣲之上隂騭兆庻詩稱上帝臨汝書曰天監孔明福善禍淫不差毫末而迷悮之子焉測其源日用不知背本向末故逺于仙道有七焉近于仙道亦有七焉當世之士未能窺妙門洞幽賾雷同以冺滅為真實生成為假幻但所取者性所遺者形甘之死地乃為常理殊不知乾坤為易之藴乾坤毁則無以見易夫形氣者為性之府形氣敗則性無所存性無所存於我何有逺於仙道一也其次謂仙必有限竟歸淪墜之弊彼昏于智察則信誣罔詎知塊然之有起自寥然之無積虚而生神神用而孕氣氣凝而漸著累著而成形形立神居乃為人矣故任其流遁則死反其宗源則仙所以招真以鍊形形清則合於氣合道以鍊氣氣清則合於神體與道㝠謂之得道道固無極仙豈有窮乎舉世大迷終於不悟逺於仙道二也其次强以存亡為一體謬以前識為悟真形體以敗散為期營魄以更生為用乃厭見有之質謀將來之身安知入造化之洪罏任隂陽之鼓鑄遊魂遷革别守他器神歸異族識昧先形猶鳥化為魚魚化為鳥各從所適兩不相通形變尚莫之知何况死而再造誠可哀者而人不哀逺於仙道三也其次以軒冕為得意功名為不朽恱色躭聲豐衣厚味自謂封殖為長策貽後昆為逺圖焉知盛必衰髙必危得必䘮盈必虧守此用為深固置清虚於度外肯以恬智交養中和率性通真為意乎逺於仙道四也其次強盛之時為情愛所役班白之後有希生之心雖修學始萌而傷殘未補靡蠲積習之性空務皮膚之好竊慕道之名乖契真之實不除死籍未載𤣥籙嵗月荏苒大期奄至及将殂謝而怨咎神明逺於仙道五也其次聞大丹可以羽化服食可以延齡遂汲汲於罏火孜孜於草木財屢空於八石藥難效於三關不知金液待訣于靈人芝英必滋于道氣莫究其本務之於末竟無所就謂古人欺我逺於仙道六也其次身棲道流心溺塵境動違科禁静無修習外招清静之譽内蓄姦回之謀人乃可欺神不可誷逺於仙道七也若乃性躭𤣥虚情寡嗜好不知榮華之可貴非强力以自髙不見淫僻之可欲非閑邪以自慎體至仁舎至静超跡塵滓棲真物表想道結襟以無為為事近於仙道一也其次希髙敦古刻意尚行知榮華為浮寄忽之而不顧知聲色能伐性捐之而不取剪隂賊樹隂徳懲忿窒慾齊毁譽處林嶺修清真近於仙道二也其次身居禄位之場心遊道徳之鄉奉上以忠臨下以義于已薄于人厚仁慈恭和𢎞施博愛外混囂濁内含澄清潜行密修好生惡死近於仙道三也其次瀟灑蓽門樂貧甘賤抱經濟之器泛若無洞古今之學曠若虚爵之不從禄之不受確乎以方外為尚恬乎以攝生為務近於仙道四也其次稟明穎之姿懐秀拔之節奮志機之旅當鋭巧之師所攻無敵一戰而勝然後静以安身和以保神精以致真近於仙道五也其次追悔既往洗心自新雖失之於壮齒冀收之於晩節以功補過過落而功全以正易邪邪㤀而正在轗軻不能移其操諠譁不能亂其性惟精惟㣲稍以誠著近於仙道六也其次至忠至孝至貞至亷按真誥之言不待修學而自得比干剖心而不死惠風溺水而復生伯夷叔齊曽參孝已人見其沒道之使存如此之流咸入仙格謂之隠景潜化死而不亡此例自然近於仙道七也放彼七逺取此七近謂之拔陷區出溺塗碎禍車登福輿始可與涉神仙之津矣於是識元命之所在知正氣之所由虚凝澹泊怡其性吐故納新和其神高虚保定之良藥匡輔之使表裏兼濟形神俱超雖未昇騰吾必謂之揮翼于丹霄之上矣夫道無為無形有情有信故曰人能思道道亦思人道不負人人負於道淵哉言乎世情謂道體𤣥虚則貴無而賤有人資器質則取有而遺無庸知有自無而生無因有而明有無混同然後為至故空寂𤣥寥大道無象之象也兩儀三辰大道有象之象也若但以虚極為妙不應以吐納元氣流隂陽生天地運日月也故有以無為用無以有為資是以覆載長存真聖不滅故為生者天地之大徳也所以見宇宙之廣萬物之殷為吾存也若煙散灰滅何異於天傾地淪彼徒昭昭非我所有故曰死者天人之荼毒孰能黜彼荼毒拂衣絶塵獨與道隣道豈逺乎將斯至矣夫至虚韞妙待感而靈猶金石含響待擊而鳴故豁方寸以契虚虚則静憑至静以積感感則通通則宇宙泰定天光發明形性相資未始有極且人之稟形模範天地五藏六府百關四肢皆神明所居各有主守存之則有廢之則無有則生無則死故去其死取其生若乃諷太帝之金書研洞真之玉章集帝一於絳宫列三元于紫房吸二曜之華景登七元之靈綱道備功全則不必琅玕大還而髙舉矣此皆自凡而為仙自仙而為真真與道合謂之神人神人能存能亡能晦能光出化機之表入太漠之鄉無心而𤣥鑒無翼而翺翔嬉明霞之館宴羽景之堂歡齊浩刼而無疆夀同太虚而不可量此道布在金簡安可輕宣其密奥哉好學之士宜啟玉檢以探其秘焉又儒墨所宗忠孝慈愛仙家所尚則慶及王侯福薦祖考祚流子孫其三者孰為大於戲古初不得而詳羲軒已来廣成赤松令威安期之徒何代不有逺則載於竹帛近則接於見聞古今得者皎皎如彼神仙可學炳炳如此凡百君子胡不勉之哉心目論人之所生者神所托者形方寸之中實曰靈府静則神生而形和躁則神勞而形斃深根寧極可以修其性情哉然動神者心亂心者目失真離本莫甚于兹故假心目而發論庶㡬於遣滯清神而已且曰心希無為而目亂之乃讓目曰予欲忘情而隠逸率性而希夷偃乎太和之宇行乎四達之逵出乎生死之域入乎神明之極乗混沌以遐逝與汗漫而無際何為吾方止若且視吾方清若且營覽萬象以汨予之正恱美色以淪之精底我邈邈于無見熈熈於流眄搖蕩於春臺悲涼于秋甸凝燕壤以情竦望吴門而髮變瞻楚國以永懐俯齊郊而泣戀繄庻念之為感皆寸眸之所眩雖身躭美飾口欲厚味耳歡好音鼻恱芳氣動予之甚皆爾之謂故為我之尤職爾之由非爾之懟而誰之仇乎目乃忿然而應之曰子不聞一人御域九有承式理由上正亂非下忒故堯俗可封桀衆可殛彼殊方而異類猶咸順乎帝則統形之主心為靈府逆則捨順則予取嘉祥以之招悔吝以之聚故君人者制理于未亂存道者克念於未散安有四海分崩而後伐叛五情播越而能貞觀者乎曷不息爾之機全爾之微而乃辯之以物我照之以是非欣其榮慼其辱暢於有餘悲於不足風舉雲逝星奔電儵紛綸鼓舞以激所欲既汩其真而混其神乖天心而悖天均焉得不溺於造物之景迷於自然之津哉故俾予於役應爾之適既嬰斯垢反以我為咎嗟乎嗟乎何弊之有心乃愀然久焉復謂目曰顧予與爾誰明其㫖何隠見之隔而𤣥同若此既庻物之為患今將擇其所履相與超塵煩之疆陟清寂之鄉餐顥氣吸晨光咀瑤華潄瓊漿斯將期靈化於羽翼出雲霞而翺翔上昇三清下絶八荒託喬松以結友偕天地以為常何毁譽之能及何取捨之足忘諒予圖之若兹其告爾以否臧目曰近之矣猶未為至若然者所謂欲静而躁隨辭埃而滓襲闇乎反本之用方邈然而獨立夫希夷之體也巻之無内舒之無外寥廓無涯杳㝠無對獨捐兹而取彼故得小而遺大忘息隂以滅影亦何逃於利害伊虚室之生白方道徳之所載絶人謀於未兆乃天理之自會故𤣥元挫銳以觀妙文宣廢心而用形軒帝得之於罔象廣成契之於杳冥顔回坐忘以大通莊生相天而能精歴衆聖以稽徳非智謀之是營盖水息瀾而暎徹塵不止而鑒明未違世以髙舉亦方寸之所寧故能泊然而常處感通而斯出不光而曜不秘而密冝始終而誰異與萬物其為一因而靡得是以罔失誠踵武於坦塗可常保於元吉若棄中而務表乃㣲往而不窒其故何哉水清而龍蟠林豐而獸居神棲於空洞道集於𤣥虚茍不刳其所有焉得契其所無非夫忘形静寂瑕滓鏡滌𤣥關自朗幽鍵已闢曷可度於無累焉不然安得駕八景昇九霄覩金闕之煌煌步紫庭之寥寥同浩刼之罔極以萬春為一朝乎心於是釋然於衆慮凝澹於猶豫澄之而徐清用之而不遽致謝於目曰達我以善道𢎞我以至言覺我以大夢啟我以重𤣥昇我以真階納我以妙門縱我於廣漠之野遊我於無窮之源既匪羣而匪獨亦奚静而奚諠恊至樂之恒適抱真精而永存遣之而無遣深之而又深通乎造化之祖達乎乾坤之心使我空欲視於目盲之外塞將見於𤣥黄之林覩有而如見空寂聞韶而若聴谷音與自然而作侣將無欲以為明免驅馳於帝主保後天之所能窒欲於未兆解紛於未擾忘天壤之為大忽秋毫之為小處寂寞而聞和潛混溟而見曉應物於循環含光而閉闗飄風震海迅雷破山滔天焚澤而我自閒彼行止與語黙曽何庸思於其間哉形神可固論并序余常思大道之要𤣥妙之機莫不歸於虚無者矣虚無者莫不歸於自然矣自然者則不知然而然矣是以自然生虚無虚無生大道大道生氤氲氤氲生天地天地生萬物萬物剖氤氲一炁而生矣故天得一自然清地得一自然寧長而久也人得一炁何不與天地齊夀而致䘮亡何也為嗜慾之機所速也故𤣥和經云人絶十二多少抱宗元一可得長生又玉京山經云常念餐元精鍊液固形質胎息静百關寥寥究三便泥丸洞明景遂成金華仙此可與天地齊夀日月齊明矣其門大開無人解入豈不哀哉余雖不才輒敢為論見此碌碌之徒區區之輩在道門者不知有守道服炁養形守神金丹之術或國之重臣匡佐社稷在於儒典禄位彌髙不知有攝養之術易形之道反精之規却補之妙多見使形體枯槁不終其夀實可傷哉余今輒論先賢之故事列以五章才不足比之為文詞不足諊之為議略述大體是非之道令守道者取虚無自然正真之一服炁者知兩半之前胎息之妙綿綿若存爾淘去三尸日滿上昇𤣥中之至合丹藥者鍊鉛取金化石為水黄芽河車神室殻矣制伏水銀而為金丹刀圭入口天地齊年悟則明矣迷為詞繁唯後學者審而消息萬不失一庻品同修感而不應得之者閉兊尋之者静思何慮節符不契大道萌生者哉守道夫道者無為之理體𤣥妙之本宗自然之母虚無之祖髙乎盖天深乎包地與天地為元與萬物為本將欲比並無物能等意欲測量無處而思於混成之中為先不見其前毫釐之内為末不見其後一人存之不聞有餘天地存之不聞不足曠曠蕩蕩渺渺漭漭人能守之天地如掌故岐伯曰上古之人知道者法則隂陽和於術數飲食有節起居有度為而不為事而無事即可柔制剛隂制陽濁制清弱制强如不退骨髓方守大道大道者多損而少益多失而少得益之得之至真之士也益者益形得者窈㝠得此窈㝠感通神明說苑曰山之髙雲雨起水之深魚鼈歸人守道福自至服炁夫元炁之術上古已来文墨不載須得志人歃血立盟方傳口訣只如上清禁訣玉函隠書百家諸子誥傳詞文乃至老君秘㫖内外黄庭灼然不顯不露五千真文略述只言𤣥牝門謂天地根似顯枝葉本蔕深密毎尋諸家炁術及見服炁之人不逾十年五年身已亡矣余生好道術志在元和毎見道流皆問無事千說萬别互有多般或食從子至午或飲五牙之津或吐故納新仰眠伸足或餐日月或閉所通又加絶粒以此尋之死而最疾何者為攻内受外故速死也抱朴子曰兩半同升合成壹大如彈丸黄如橘就中佳味甜如蜜爾牢持之謹勿失子若得之萬事畢是以炁之為功如人之量器如水之運流堤壊則水下流矣閉通則炁不居矣但莫止出入自然之息胎鍊精神固其大和含其大道若明胎息則曉元炁胎息與元炁同也徳經曰可以却走馬以糞如嬰兒之未孩故龜甲經云我命在我不在天不在天者謂知元炁也人與天地各分一炁天地長存人多夭逝何也謂役炁也炁者神也人者神之車也神之室也神之主人也主人安静神則居之躁動神則去之神去則身死者矣養形夫人未有其兆則天地清寧剖道之一炁承父母餘孕因虚而生立有身也有一附之有神居之有炁存之此三者遞相成可齊天地之夀共日月而齊明何者為修身慎行助育元炁胎息藏府存神想思含虚守無宗皇之一西昇經曰知一萬事畢則神形也抱朴子曰人不知養生焉能有為生人不曾夜行焉知有夜行故知養神修身者夀老棄神愛慾者中夭也莫逆理而為事敗長乆之佳珍隂陽之道以有此身身含形神全一心動則形神蕩慾不可縱縱之必亡神不可辱辱之必傷傷者無返期朽者無生理但能止嗜慾戒荒淫則百骸理而萬化安若人遺行不可為之年或恐力不可致何者若鑄頑氷以為寶鏡駕石舟以泛波瀾非鬼神能助之非天地能運之况人受道炁則剖得神分得一有此形骸而不能守養之但擬取餘長之財設齋鑄佛行道吟詠祈禱鬼神以固形骸還同止沸加薪緝紗為縷豈有得之者乎形之與神常思養之自以色聲香味以快其情以惑其志以亂其心此三者敗身逆道亡形沈骨䘮身之所由生者也守神夫人生成分一炁而為身稟一國之象有炁存之有神居之然後安焉身者道之器也知之脩鍊謂之聖人奈何人得神而不能守之人得炁而不能採之人得精而不能反之已自投逝何得怨天地之不祐按黄書云人因積炁以生身留胎止精可長存天年之夀昭眧著矣抱朴子曰自古人移遺却妻今世人移遺却身何也謂不解反精採炁故遺也且一隂一陽天地之道男不可無婦女不可無夫男女隂陽皆合大道不節則失理亡形沈體且據老君秘㫖内外黄庭上清禁訣玉函隠書黄帝赤文沖和子真訣灼然有隂陽之道昭矣秘㫖曰吾不敢為主復為客慎勿臨髙自投擲促存内想閉諸隙正卧垂囊兼偃脊四合五合道自融吸精吐炁㣲將通裊裊靈柯不復空時時玉壘補前功補之之道將如何𤣥牝之門通且和泝流百脈填血腦夫妻俱仙此其道欲求長生夀無極隂戶開時别消息又按大陽子谷隂女曰我行青龍與白虎彼行朱雀及騰蛇東九西七南三北五中居一反精採炁而補我身虚入實出甄我藏府即可夀無涯矣隂符經曰經冬之草覆之不死露之見傷火生於木禍發必尅精生於身精竭而死人之炁與精神易濁而難清易闇而難明知之修鍊實得長生豈不見鯨魚失水被螻蟻之所食人不守神被蟲蛆之所潰得道者魚常游於澤則不涸人若常固於炁則不死矣人皆好長生而不知有益精易形人皆畏其死而不知有守神固炁能依此者子無䘮父之憂弟無哭兄之患則不可握無形之風捕無見之物天年之夀自然而留矣金丹金丹大藥文字縱載互有隠顯看文不如口訣口訣不如眼見眼見不如手傳然修身未合其真且須宗𤣥一炁其藥也金土配乾坤龍虎生骨髓魂魄為夫婦龜蛇二女子午神本四位三炁還守二法象得成龍姹女因留止為得鉛中金兼得石中水節序奉行日月合軌賢者待行道北方水金是赫然還丹成𤣥黄煥爛熻赩焜煌􅀈􅂱日月五星不足比其光澤也生隂長陽變化無倫翺翔碧落縱曠𤣥漠飄飄大素歸虚反真體造化之所成以刀圭入口共天地齊夀可與雞犬同飛室宅拔上謂之靈聖真人感應也遊仙詩二十四首啟冊觀往載搖懷考今情終古已寂寂舉世何營營悟彼九仙妙超然全至精凝神契沖𤣥化服凌太清心同宇宙廣體合雲霞輕祥風吹羽葢慶霄拂霓旌龍駕朝紫㣲後天保令名豈知寰中士軒冕矜暫榮晨登千仞嶺俯瞰世人居原野間城邑山河分里閭眇彼埃塵中爭奔聲利途百齡寵辱盡萬事皆為虚自昔無成功安能與爾俱將期駕雲景超跡昇天衢鸞鳳棲瑤林鵰鶚集平楚飲啄本殊好翺翔終異所吾方遺諠囂立節慕髙舉解兹區中戀結彼霄外侣誰謂天路遐感通自無阻愍俗從遷謝尋仙去淪沒三元有真人與我生道骨凌晨吸丹景入夜飲黄月百關彌調暢方寸益清越棲神合虚無洞覽周恍惚不覺隨玉皇焚香詣金闕西龜初定籙東華巳校名三官無遺譴七祖昇雲軿體妙塵累隔心㣲𤣥化并一朝出天地億載猶童嬰使我齊浩刼蕭蕭宴玉清怡神在靈府皎皎含清澄仙經不吾欺輕舉信有徴疇昔希道念而今果天矜豈非隂功著乃騐白日昇焉用過洞府吾其越朱陵骨鍊體彌清鑒明塵巳絶恬夷宇宙泰煥朗天光徹羽服參煙霄童顔皎氷雪隠符千魔駭鳴玉萬帝恱遂使區宇中祅氣永淪滅髙真誠寥邈道合不我遺孰謂姑射逺人神可同嬉結駕從之遊飄飄出天陲不理人自化神凝物無疵因知至精感足以和四時碧海廣無際三山髙不極金臺羅中天羽客恣遊息霞液朝可飲虹芝晩堪食嘯歌自忘心騰舉寧假翼保夀同三光安能紀千億將過太帝宫蹔詣扶桑處真童已相迓為我清宿霧海若寧洪濤羲和止奔馭五雲結層閣八景動飛輿青霞正可挹丹椹時一遇留我宴玉堂歸軒不令遽欲超洞陽界試鑒丹極表赤帝躍火龍炎官控朱鳥導我昇絳府長驅出天杪陽靈正赫暉四達何皎皎為爾流凱風羣生可無夭予因詣金母飛盖超西極遂入素天中停輪太濛側若華拂流景不使白日匿傾曦復亭午六合無暝色道化隨感遷此理誰能測朝逾弱水北夕憩鍾山頂顓頊清𤣥宫禺强掃幽境燭龍發神曜隂野彌煥炳導達三氣和驅除六天静玉樓互相暉烟客何秀穎一舉流霞津千年在俄頃揚盖造辰極乗煙遊閬風上元降玉闥王母開琳宫天人何濟濟髙㑹碧堂中列侍奏雲歌真音滿太空千年紫柰熟四刼靈𤓰豐斯樂異荒讌陶陶殊未終整駕辭五嶽排煙凌九霄紛然太虚中羽斾更相招且盼蓬壺近誰言崐閬遙悠悠竟安適仰赴三天朝九龍何蜿蜿載我昇雲綱臨睨懐舊國風塵混蒼茫依依逺人寰去去邇帝鄉上超星辰紀下視日月光儵已過太㣲天居煥煌煌停驂太儀側整服金闕前肅肅承上帝鏘鏘會羣仙鴻爐發靈音廣廡張鈞天玉醴洽中座霞膏充四筵良期無終極俛仰移億年峻朗妙門闢澄㣲真鑒通瓊林九霞上金閣三天中飛虬躍慶雲翔鶴摶靈風鬱彼玉京會仙期六合同予昇至陽原欲憩明霞館飄飄瓊輪舉􅁮􅁮金景散結虚成萬有髙妙咸可翫玉山鬱嵯峨琅海杳無㟁暫賞過千椿遐齡誰復算招攜紫陽友合宴玉清臺排景羽衣振浮空雲駕来靈幡七曜動瓊障九光開鳳舞龍璈奏虬軒殊未迴髙昇紫極上宴此𤣥都岑玉蘂散竒香瓊柯流雅音靈風生太漠習習吹人襟體渾希夷廣神凝空洞深蕭然宇宙外自得乾坤心招三清友迥出九天上撓挑絶漠中差池遙相望太空含常明八外無隠障鸞鳳有逸翮泠然恣飄颺寥寥唯𤣥虚至樂在神王聳身太霞上眇眇虚中浮八威先啟行五老同我遊靈景何灼灼祥風正寥寥簫歌振長空逸響清且柔遨嬉無近賞顧眄皆真儔不疾而自速萬天俄已周返視太初先與道𡨕至一空洞凝真精乃為虚中實變通有常性合散無定質不行迅飛電隠曜光白日𤣥棲忘𤣥深無得固無失步虛詞十首衆仙仰靈範肅駕朝神宗金景相照曜逶迤昇太空七𤣥已髙飛火鍊生朱宫餘慶逮天壤平和王道融八威清遊氛十絶舞祥風使我躋陽原其來自隂功逍遙太霞上真鑒靡不通逸轡登紫清乗光邁奔電閬風隔三天俯視猶可見玉闥標敞朗瓊林鬱䓤倩自非挺金骨焉得諧夙願真朋何森森合景恣遊宴良會忘淹留千齡纔一盼三宫發明景朗照同鬱儀紛然馭飈歘上採空青蕤令我洞色金後天曜瓊姿心叶太虚静寥寥竟何思𤣥中有至樂澹泊終無為但與正真友飄飄從遨嬉稟化凝正氣鍊形成真仙忘心符元宗返本叶自然帝一集絳宫流光出丹𤣥無英與桃君朗詠長生篇六府煥明霞百關羅紫煙飈車涉寥廓靡靡乗景遷不覺雲路逺斯須遊萬天扶桑誕初景羽盖凌晨霞儵歘造西城嬉遊金母家碧津湛洪源灼爍敷荷花煌煌青琳宫粲粲列玉華真氣溢絳府自然思無邪俯矜區中士夭濁良可嗟瓊臺刼萬仞孤暎大羅表常有三素雲凝光自飛繞羽童泛明霞升降何縹緲鸞鳳吐雅音棲翔絳林標玉虚無書夜靈景何皎皎一覩太上京方知衆天小灼灼青華林靈風振瓊柯三光無冬春一氣清且和迴首邇結璘傾眸親曜羅豁落制六天流鈴威百魔緜緜慶不極誰謂椿齡多髙清無侈靡遇物生華光至樂非簫歌玉音自玲琅或登明真臺宴此羽景堂杳靄結寶雲霏微散靈香天人誠多暇歡泰不可量爰從太㣲上肆覲虚皇尊騰我八景輿威遲入天門既登玉晨庭肅肅仰紫軒敢問龍漢末如何闢乾坤怡然輟雲璈告我希㣲言幸聞至精理方見造化源二氣播萬有化機無停輪而我操其端乃能出陶鈞寥寥升太漠所遇皆清真澄瑩含元和氣同自相親絳樹結丹實紫霞流碧津願以保童嬰永用超形神建業懐古炎精既失御宇内為三分吴王霸荆越建都長江濱爰資股肱力以静淮海民魏后欲濟師臨流遽旋軍豈惟限天塹所忌在有人惜哉歸命侯淫虐敗前勲銜璧入洛陽委躬為晉臣無何覆宗社為爾含悲辛俄及永嘉末中原塞胡塵五馬浮渡江一龍躍天津此時成大業實賴賢搢紳闢土雖未逺規模亦振振謝公佐王室仗節掃偽秦誰謂吴兵孱用之在有倫荏苒守齊宋斯須變梁陳綿厯已六代興亡互紛綸在徳不在險成敗良有因髙壇復于隍廣殿摧于榛王風久泯滅勝氣猶氤氲皇家一區域𤣥化通無垠常言宇宙泰忽遘雲雷屯極目梁宋郊茫茫晦妖氛安得倚天劔斷兹横海鱗徘徊江上暮感激為誰申經羊角哀墓作祇召出江國路傍旌古墳伯桃𦵏角哀墓近荆將軍神道不相得稱兵觧其紛幽明信難知勝負理莫分長呼遂刎頸此節古未聞兩賢結情愛骨肉何足云感子初併糧我心正氛氲遲迴駐征騎不覺空林醺登北固山望海北山鎮京口迥出滄海湄躋覽何所見茫茫朝夕馳雲生蓬萊島日上扶桑枝萬里混一色焉能分兩儀願言策煙駕縹緲尋安期揮手謝人境吾將從此辭過天門山懐友人舉帆遇風勁逸勢如飛奔縹緲凌煙波崩騰走川原兩山夾滄江豁爾開天門須臾輕舟逺想像孤嶼存歸路日已近怡然慰心魂所經多奇趣待與吾友論一日如三秋相思意彌敦舟中遇栁伯存歸潛山因有此贈澆風乆成俗真隠不可求何悟非所冀得君在扁舟目擊道已存一笑遂忘言况觀絶交書兼覩箴隠文見君浩然心視世如浮空君歸潛山曲我復廬山中形間心不隔誰能嗟異同他日或相訪無辭馭泠風舟中夜行榜人識江路挂席從宵征莫辨洲渚狀但聞風波驚隂雲正飄颻落月無光晶豈不畏艱險所憑在忠誠何時達遙夜佇見初日明晩到湖口見廬山作呈諸故人夜舟達湖口漸近廬山側髙髙標横天隠隠何峻極石鏡啟晨暉鑪烟凝寒色旅泊將休暇歸心已躋陟虚名久為累使我辭逸域良願道不違幽襟果兹得故人在雲嶠乃復同偃息鴻飛入青㝠虞氏罷矰弋苦春霖作應龍遷南方霪雨備江干俯望失平陸仰瞻隠崇巒隂風斂暄氣殘月凄已寒時鳥戢好音衆芳亦㣲殘萬流注江湖日夜増波瀾數君曠不接悄悄無與歡對酒聊自娱援琴為誰彈彈為愁霖引曲罷仍永歎此歎因感物誰能識其端寫懐寄同心詞竭意未殫酬葉縣劉明府避地廬山言懐詒鄭録事昆季茍尊師兼見贈之明哲良罕遇遇君輒思齊挺生著天爵自可析人珪河洛初沸騰方期掃虹霓時命竟未合安能親鼓鼙從此罷飛鳬投簮辭割雞驅車適南土忠孝兩不暌廬嶽鎮江介於焉惬林棲入門披綵服出谷杖紅藜隠令舊閭里而今復成躋鄭公解簮紱華萼曜松溪賢哉茍徴君滅跡為圃畦顧已誠非薄忝兹忘筌蹄相歡對綠樽逸思凌丹梯道泰我長往時清君勿迷王孫且無歸芳草正萋萋宗𤣥集巻中
