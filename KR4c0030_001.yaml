body:
  text: 宗𤣥集卷上唐吳筠撰巖棲賦感𤣥聖之垂訓悟已親而名疏言可放而從默身應卷而勿舒愛鷦鷯之巢林在一枝而有餘性所恱而難違託兹山以結廬果棲遲而我愜即逍遙之靈墟觀其繚崇巒橫峻谷激泌泉羅森木後巍嶷以縈紆前參差而聳伏追隂壑之夏涼偃陽崖之冬燠美徑節於松筠玩幽芳於蘭菊虛籟清耳閒雲瑩目因海鶴以警夜任晨雞以知旭慮靜於無擾神恬於寡欲於是歌考槃於詩人諷嘉遁於大易逺浮俗之艱險消毁譽之損益蹈方外之坦途信可免於兢惕既即隂以息影由不行而滅跡雖區中之末計實世表之長䇿人所棄而已收故處約而恆適覽無見以收視聽無聲以返默和匪專於㫖酒樂奚必於絲桐焚清香以鍊氣啓玉檢而擊䝉期遣滯於昭曠庶延真於感通筌太虛之有象核妙用之非空朝天甚簡採藥多暇形猶資於吐納意已屏於將迓知道無廢興而物有存謝故挹生本而常生體化宗而不化蕭蕭絶塵誰與為鄰跡逺而朋從益曠機忘而鳥獸可馴韻靡叶於當時心常依於古人仰巢由浩浩之逸軌詠羲農默默之化淳師黃老之𤣥奧友喬松之道真慙無功之逮物良獨善於吾身祇所幸其自得敢韜精於隱淪竹賦惟坤靈之播育何備物之實繁偉兹竹之標挺得造化之清源契道合虛表貞示節葉森散以翠錯莖鮮修而瓊潔爾其和風流暢萬彚昭陳楊葩曄其密苑荑栁藹于通津不郁馥以啓曜但葳蕤而有筠亦未之為異也至如殺氣凌厲凝霜蕭瑟覽平楚之蒼茫窺衆林之如失冒冰霜之涸沍逾青熒以鬱密若是則殊可重焉故詩曰如苞書稱厥貢猗兹淇園美彼雲夢昔在軒后肇官隂陽俾伶倫於嶰谷伐修竹之珍篁裁六律以協氣調八風而順常然後成竽籥以備樂其聲濫而彌長笙鏞以間鳥獸蹌蹌諒自然之純粹曷羣材之可方若乃渭川千畝山陽數林會稽方潤於碧玉羅浮比色於黃金上黕黕以雲翳下泠泠而風吟祛赫曦之燠景納凄清之涼隂王子所以嘯詠嵇生為之幽尋召嘉賓及令友暢醁醴與鳴琴美遊盤之逸趣清寂寞之逺心若乃夾滄江倚丹崿蓄水霧之沈沈搖岩煙之漠漠湘妃有揮涕之感楚謠興防露之作或挺鼓吹之嶔崟或垂天門之磅礴皆鸞鳳之所翔集孔翠之所棲託豈獨嬋姢於廣漠之壤亦有璀璨於蓬萊之峯結實珠粒敷花紫茸拂皓粉以飛雪摧紺莖以韻鍾固列仙之攸玩匪吾人之所從也亦有化雉吳國成龍葛陂容人篔簹育蟲桃枝一筍明其𦙍嗣三節獲乎嬰兒縈燈纂以感孝茂窗櫺以表竒篲冡壇以塵滅環石牀以䕃滋皆靈變之譎怪良難得而備知爾其衆彚非一則有篥簩䈥籩􅀢筒籃箊􅀢􅀢菰箠之肅矗龍鍾雲母之扶疏箬箭浮色以縹煥菡􅀢綷文而繡攄方志之所遺載山經之所闕書者安可得而詳矣靡不徑堅其性蔥蒨厥色不規而圓不揉而直故髙皇製冠以寶位孝文剖符以表職博望侯傳於大夏之外穆天子封於𤣥池之側推此類以彌廣匪斯文之可極逸人賦粵真隱先生者體曠容寂神清氣沖迥出塵表深觀化宗偃太和之室詠𤣥古之風收人之所不寶棄人之所必崇以道德為林囿永逍遙乎其中有玩世公子思發其䝉乃詣先生之所舍詢出處之異同於是稽首跪而稱曰僕聞士之生也備百行榮九德靜為物軌動為人則可見故不隱可言故無默使上叶唐虞之化下安仁夀之域既兩儀交泰九有不攜然後分人之土執人之圭故伊尹負鼎而去有莘太公釋釣而出磻磎朝淪汙泥夕步丹梯若喬木之集鵷鳳清流之躍鳬鷖何必矯抗斯慕中和見睽躡跡巢許追蹤夷齊膏屯於骨肉和勦於氓黎損坦蕩之修衢履幽廢之荒蹊潄寒泉之泠泠藉青草之萋萋悲林風之夕振厭山鳥之晨啼始支離而餒息終臠卷而寒棲信行藏之足驗唯名實之可稽願一聞其至言俾向方而不迷也先生宇合寥天心凝帝先泯禍福之境杜樞機之權將有言而中止不得已而應焉曰夫洪荒之際物靡艱阻上如崇丘下若平楚髙卑定位各暢其所賢愚同條智詐罔舉孰為出孰為處孰為默孰為語逮乎時遷朴散質變淳訛升沈異躅明暗殊科剛柔相軋曲直相摩或貪餌以吞鉤或橫飛以觸羅惟皇王之愍俗爰拯溺於洪波乃自揖讓迄于干戈雖政教之異冝誠法令之滋多欲遏亂以求理譬招風而靜柯遂飾禮以邀敬修樂以導和雖聖哲之區區卒傾頺而奈何於是上有淫君下彰忠臣龍逄之列萇𢎞之倫茍徇義以成名竟違天而殺身秖足以增惡聲於暗主竭惠澤于生民故全德之士韜精保真悟厯數之在運知存亡之匪人將扶危而翼顛猶一髮之擢千鈞塊壤之壅長津所以守嘉遁之元吉從少微之隱淪於是洪崖廣成肇其端子州善卷緒其後汾水見傲帝之賓潁陽聞洗耳之叟以鴻名為糟粕以大寶為塵垢情蠲於取舍意適於林藪不刳心而無欲非吐納以永夀眄江河為畎澮謂嵩岱為培塿故天子不可得而臣諸侯安可得而友豈作者之唯艱誠歷世而可久莫不道貫通於古今跡無繫於竒偶鎮末代之僞薄使向風而歸厚若乃子髙之規夏禹臧叟之誨周文仲連之却秦師干木之蕃魏君弦髙俯仰以成績四皓從容以立勳初混世以表用竟超然而絶羣既抗志於青霞聿棲身於白雲兹乃無封滯於萬物時撫俗以解紛者矣若乃顧推讓有泰山之重視富貴若鴻毛之輕則孤竹之子王季之兄甘食薇於首陽之下恱採藥於句吳之坰柱史歸居而道闡關尹去職而真成晨門藏名於抱關沮溺避世而耦耕漢隂抱甕以忘機漁父乘流而濯纓於陵灌園以逃相萊氏負戴以辭卿南華漆園以寓跡列子鄭圃以消聲楚狂隱晦蜀嚴湛冥丞相推堂於蓋公廷尉結襪於王生故文景尊黃老之術國既富而刑清季主卜筮以訓俗文通訟田以穢名顔闔鑿坯以避聘伯休濳遁以脫榮龎公課妻以耘鋤嚴光拂衣於帝庭啓期三樂以達意梁鴻五噫以抒情尚子平之持操畢婚娶以長往許叔𤣥之守節遺伉儷以遐征聽蘇門之永嘯若鸞鳳之和鳴見夏統之長歌歘雲飛而雪零至于焦先瞿硎郭文董京天機符於太素淵默會於真精寂爾無悶則子真仲蔚確乎不拔有臺佟管寧或琴書以自娛或淡漠以無營此則同人者體貌異人者神明抱不易之純粹含自然之孤貞道取怡於閒放業故失於屯平曉物理之尚簡知天道之惡盈彼鴻飛於寥廓奚弋者之能縈故寵章焉得而見纍悔吝何由而相傾哉爾其隂德密庸𤣥功潜著不戚其所毁不欣其所譽為無為以成性事無事以淡慮洞希夷之可察涉恍惚而斯據託松涓以結友忽駕景而飛去兹乃隱道其誰能測無何鄉之處乎是以朝廷之士一入而不出山林之客冝往而勿還若沽名於白賁衒跡於青山覬蒲輪於谷口希束帛於雲關非岩泉之養正實丘壑之藏姦繄末世之鄙薄曷清流之可攀或因兹以幸達詎不藴終身之厚顔矣夫徼福之萌禍胎祈昌之結衰根故不韋之識竒貨獻孕妻以密言呂公之辨龍顔謀納女以永尊計克從而事捷排天路以騰翻遽變生而殃搆招釁罰以鍾門霍氏之翼三后謂伊周之復存何赫奕於當時亟殄殱其子孫鑒興亡之體勢實異代而同源已覆敗于前車又傾摧於後轅秦肆坑儒之毒漢流黨錮之寃衆君子欲修名顯著乃貽戚於塋魂仰天居之悠迥誰克叶於帝閽固知祥風依於蓬蓽沴氣襲於華軒吾方將友汗漫師𤣥元默生死同乾坤當愈幽憂之疾所以秉斯道而彌敦也先生之言既畢公子拜手而謝曰小子久耽淺近之常議幸沐精微之奧論可謂滌除遺滓披拂重昏願澡雪其形神以遊夫子之末藩而已矣宗𤣥集卷上
