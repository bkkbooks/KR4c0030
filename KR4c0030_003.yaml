body:
  text: 宗玄集卷下唐吳筠撰覽古詩十四首聖人重周濟明道欲救時孔席不暇暖墨突何嘗緇興言振頺綱將以有所維君臣竟淫惑風俗日凋衰三代業遽隕七雄遂交馳庶物墜塗炭區中若棼絲秦皇燎儒術方册靡孑遺大漢立五葉斯文復崇推乃驗經籍道與世同屯夷弛張固天意設教安能持興亡道之運否泰理所全奈何淳古風既往不復旋三皇已散朴五帝初尚賢王業與霸功浮偽日以宣忠誠及狙詐殽混安可甄餘智入九霄守愚淪重泉永懷巢居時感涕徒泫然棟宇代巢穴其來自三皇迹生固為纍經始增百王瑤臺既滅夏瓊室復隕商覆車世不悟秦氏興阿房繼踵迷反正漢家策建章力役弊萬人瓌竒殫八方徇志仍未極促齡已云亡侈靡竟何在荆榛生廟堂間居覽前載惻彼商與秦所殘必忠良所寶皆凶嚚昵諛方自聖不悟禍滅身箕子作周輔孫通為漢臣洪範及禮義後王用經綸吾觀采苓什復感青蠅詩讒佞亂忠孝古今同所悲姦邪起狡猾骨肉相殘夷漢儲殞江充晉嗣滅驪姬天性猶可間君臣固其宜子胥烹吳鼎文種斷越鈹屈原沈湘流厥戚誠自貽何不若范蠡扁舟無還期嘗稽真仙道清寂祛衆煩秦皇及漢武焉得遊其藩情擾萬幾屑位驕四海尊既欲先宇宙仍規後乾坤崇髙與久逺物莫能兩存矧乃恣所欲荒淫伐靈根金膏恃延期玉卮復動魂征戰窮外域殺傷被中原天鑒諒難誣神理不可諼安期返蓬萊王母還崑崙異術終莫告悲哉竟何言魯侯祈政術尼父從棄捐漢主思英才賈生亦排遷始皇重韓子及覩乃不全武帝欽相如既徴復忘賢貴逺世咸爾賤今理共然方知古來士難以效當年食其昔未遇落魄為狂生一朝君臣契雄辨何縱橫運籌康漢業憑軾下齊城既以智而達還為智所烹豈若終貧賤酣歌本無營朝錯抱逺策為君納良規削彼諸侯權永用得所宜姦臣負舊隙乘釁謀相危世主竟不辨身戮宗且夷漢景稱欽明濫罰猶如斯比干與龍逄殘害何足悲絳侯成大績賞厚位仍尊一朝對獄吏榮辱安可論蘇生佩六印奕奕為殃源主父食五鼎昭昭成禍根李斯佐二辟巨釁鍾其門霍孟翼三后伊戚及後昆天人忌盈滿兹理固永存方知得意者何必乘朱輪滅景棲逺壑絃歌對清樽二疏返濱海蔣詡歸林園瀟灑去物纍此謀誠足敦至人順通塞委命固無疵吾觀太史公可謂識道規留滯焉足憤感懷殄生涯吾歎龔夫子秉義確不移晦迹一何晚天年夭當時薰膏自銷爍楚老空餘悲達者貴量力至人尚知幾京房洞幽贊神奧咸發揮如何疾元惡不悟禍所歸謀物暗謀已誰言爾精微玄元明知止大雅尚保躬茂先洽聞者幽賾咸該通弱年賦鷦鷯可謂達養蒙晚節希鸞鵠長飛唳層穹知進不知退遂令其道窮伊昔辨福初胡為迷禍終方驗嘉遁客永貞天壤同聖人垂大訓奧義不茍設天道殃頑凶神明祐懿哲斯言猶影響安得復回穴鯀瞍誕英睿唐虞有昏孽盜跖何延期顔生乃短折魯隱全克讓禍機遂潛結楚穆肆巨逆福柄奚赫烈田恆弒其主祚國久罔缺管仲存霸功世祖成詭説漢氏方版蕩羣閹恣邪謫謇謇陳蕃徒孜孜抗忠節誓期區宇靜爰使凶醜絶謀協事靡從俄而返誅滅古來若兹類紛擾難盡列道遐理微茫誰為我昭晰吾將詢上帝寥廓詎躋徹已矣勿用言忘懷庶自恱髙士詠有序易稱君子之道或出或處或默或語蓋出而語者所以佐時致理處而默者所以居靜鎮躁故雖無言亦幾於利物豈獨善其身而已哉夫子曰隱居以求其志行義以達其道所謂百慮一致殊途同歸者也夫好同惡異人之常情豫自弱年竊尚真隱逺覽先達實怡我心雖不見古人而餘風可仰是則是效其惟嘉遁之士乎故企慕之不足則師友之師友之不足則詠歌之聊樂我真於是乎在昔玄晏先生皇甫謐因其所美而著髙士傳梁伯鸞有髙士頌愚今有髙士詠亦各一時之志耳太初渺邈難得而詳洪崖之流無迹可紀故始於混元皇帝終於陶徴君舉其絶倫明其標的為五十首以吟諷其德音焉混元皇帝玄元九仙主道冠三氣初應物方佐命棲真亦歸居遺篇訓終古駕景還太虛孔父歎猶龍誰能知所如廣成子廣成卧雲岫緬邈逾千齡軒轅來順風問道修神形至言發玄理告以從杳冥參光入無窮寂默返大寧許先生大名賢所尚寶位聖所珍皎皎許仲武遺之若纎塵棄瓢箕山下洗耳潁水濱物外兩寂寞獨與玄冥均樊先生巢父志何逺潛精人莫知恥聞讓王事飲犢方見移不欲散太朴焉能為堯師錬真自輕舉浮世何足遺伯成子髙大禹受禪讓子髙辭諸侯退躬適外野放浪夫何求萬乘造中畝一言良見酬俋俋耕不顧斯情邈難儔臧丈人臧叟隱中壑垂綸心浩然文王感昔夢授政道斯全一遵無為術三載淳化宣功成遂不處遁迹符沖玄伯夷叔齊夷齊互崇讓棄國從所欽聿來及宗周乃復非其心世獨不可處氷清首陽岑采薇詠羲農髙義越古今南華真人南華原道宗玄逺故不測動與造化遊靜合太和息放曠生死外逍遙神明域况乃資九丹輕舉歸太極沖虛真人沖虛冥至理體道自玄通不受子陽祿但飲壺丘宗冷然竟何依撓挑遊太空未知風乘我為是我乘風洞靈真人亢倉致虛極潛迹依逺岫智去愚獨留日虧嵗方就鄉人謀尸祝不欲聞俎豆尚賢非至理堯舜固為陋通玄真人通玄貴隂德利物非市朝悠然大江上散髮揮輕橈已陳緇帷説復表滄浪謠滅迹竟何往遺文􅍦昭昭文始真人文始通道源含光隱關吏遙欣紫氣浮果驗真人至玄誥已云錫世榮何足纍髙步三清境超登九仙位榮啓期榮期信知止帶索無所求外物非我尚琴歌自優遊三樂通至道一言醉孔丘居常以待終嘯傲夫何憂長沮桀溺賢哉彼沮溺避世全其真孔父棲棲者征途方問津行藏既異迹語默豈同倫耦耕長林下甘與鳥雀羣顔闔世情矜寵譽效節激當時顔闔遵無名飯牛聊自怡逃聘鄙束帛鑿壞欣茅茨託身囂塵表放浪世莫知老萊夫妻萊氏道已逺懿妻德彌清一遁囂煩趣永契雲壑情祿位非所重拂衣遂遐征杳然從我願豈為物所攖楚狂接輿夫妻接輿耽沖玄伉儷亦真逸傲然辭徴聘耕績代祿秩鳯歌誡文宣龍德遂隱密一遊峨嵋上千載保靈術鄭商人弦髙卓哉弦髙子商隱獨標竒效謀全鄭國矯命犒秦師賞伸義不受存公滅其私虛心貴無名逺迹居九夷栁下惠展禽抱純粹滅迹和光塵髙情遺軒冕降志救世人百行既無玷三黜道彌真信謂德超古豈唯言中倫荷蓧晨門荷蓧隱耕藝晨門潛抱關道尊名可賤理愜心彌間混迹是非域縱懷天地間同譏孔宣父匿景杳不還漢隂丈人野哉漢隂叟好古遂忘機抱甕誠亦勤守朴全道微子貢初不達聽言識其非已為風波人恍惘失所依於陵夫妻皎皎於陵子已賢妻亦明安兹道德重顧彼浮華輕琴書方為務祿位不可榮逃迹終灌園誰能達世情太項橐太項冥虛極微逺不可究稟量合太初返形寄童幼孔父慙至理顔生賴真授泛然同萬流無迹世莫遘太伯延陵太伯全至讓遂投蠻夷間延陵嗣髙風去國不復還尊榮比蟬翼道義侔崇山元規與峻節歷世無能攀壺丘子壺丘道為量玄虛固難知季咸曜淺術禦冦初深疑至人忘禍福感變靡定期太沖杳無朕元化誰能知段干木干木布衣者守道杜衡門德光義且冨肯易王侯尊魏主欽其賢式廬情亦敦秦兵遂不舉髙卧為國藩魯仲連仲連秉竒節釋難含道情一言却秦圍片札降遼城辭金義何逺讓祿心益清處世功已立拂衣蹈滄溟顔歜髙哉彼顔歜逸氣陵齊宣道尊義不屈士重王來前榮祿安可誘保和從自然放情任所尚長揖歸山泉周豐周豐貴隱耀靜默尊無名魯侯詢政體喻以治道精蒞人在忠慤疑叛由會盟一言達至義千載良為程師金聖人貴素朴禮義非玄同師金告顔生可謂達化宗夫子飾芻狗自然道斯窮應物方桔橰俯仰靡不通南郭子綦子綦方隱几冥寂久灰心悟來應顔遊清義杳然深含響盡天籟有言同鷇音是非不足辨安用勞神襟黔婁先生黔婁藴雅操守約遺代華淡然常有怡與物固無瑕哲妻配明德既沒辨正邪辭祿乃餘貴表諡良可嘉原憲原生何淡漠觀妙自怡性蓬戶常晏如絃歌樂天命無財方是貧有道固非病木賜欽髙風退慙車馬盛商山四皓萬方厭秦德戰伐何紛紛四皓同無為丘中卧白雲自漢成帝業一來翼儲君知幾道可尚隱括成元勳河上公邈邈河上叟無名契虛沖靈關暢玄旨萬乘趨道風寵辱不可纍飄然在雲空獨與造化友誰能測無窮東方曼倩東方稟易象玩世隱廊廟棲心抱清微混迹祕光耀玄覽寄數術納規在談笑賣藥五湖中還從九仙妙嚴君平漢皇舉遺逸多士咸已寧至德不可拔嚴君獨湛冥卜筮訓流俗指歸暢玄經閉關動元象何必遊紫庭司馬季主季主超常倫沈迹寄卜筮宋賈二大夫停車試觀藝髙談哂朝列洪辨不可際終秉鸞鳳心翛然已遐逝鄭子真張仲蔚子真巖石下仲蔚蓬蒿居禮聘終不屈清貧長晏如忘情在耕藝養夀資玄虛至樂非外物道冥歡有餘嚴子陵漢皇敦故友物色訪嚴生三聘逮深澤一來過帝庭紫宸同御寢玄象驗客星祿位終不屈雲山樂躬耕向子平子平好真隱清淨玩老易探玄樂無為觀象驗損益常抱方外心且紆人間迹一朝畢婚娶五嶽遂長適韓康伯休抱遐心隱括自為美賣藥不二價有名返深恥安能受玄纁秉願終素履逃遁從所尚蕭蕭絶塵軌臺佟管寧吾嘉臺孝威樂道隱巖穴吾尚管幼安棲真養髙節採藥聊自給觀書任所恱風塵不可混真素比松雪髙鳳吾觀時人趣矯迹務馳聲獨有髙文通訟田求翳名公車徒見纍爵祿非所榮隱身樂漁釣世網不可攖龎德公龎公棲鹿門絶迹逺城市超然風塵外自得丘壑美耕鑿勤厥躬耘鋤課妻子保兹永無患軒冕何足紀玄晏先生士安逾弱冠落魄未修飭一朝因感激志學忘寢食著書窮天人辭聘守玄默薄葬信昭儉可為將來則孫公和孫登好淳古卉服從穴居彈琴合天和讀易見象初終日無愠色恬然在玄虛貽言誡叔夜超迹安所如董威輦董京依白社散髮詠玄風心出區宇外迹參城市中囂塵不能雜名位安可籠匿影留雅什精微信難窮郭文舉郭生在童稚已得方外心絶迹遺世務棲真入長林元和感異類猛獸懷德音不憶固無情斯言微且深陶徴君吾重陶淵明達生知止足怡情在樽酒此外無所欲彭澤非我榮折腰信為辱歸來北忩下復採東籬菊宗玄集卷下
