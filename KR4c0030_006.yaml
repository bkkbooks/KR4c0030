body:
  text: 吴尊師傳吴筠字貞節魯中儒士也少通經善屬文舉進士不第性髙潔不伍流俗乃入嵩山依體𤣥先生潘師正為道士傳正之一法苦心鑚仰盡通其術開元中南遊金陵訪道茅山乆之東遊天台筠尤善著述在剡與越中文士為詩酒之㑹所著歌篇傳於京師𤣥宗聞其名遣使徵之既至與語甚悦令待詔翰林帝問以道法對曰道法之精無如五千言其諸枝詞蔓説徒費紙劄爾又問神仙修鍊之事對曰此野人之事當以嵗月功行求之非人主所當適意每與緇黄列坐朝臣啟奏筠之所陳但名教世務而已間之以諷詠以達其誠𤣥宗深重之天寳中李林甫楊國忠用事綱紀日紊筠知天下將亂堅求還嵩山累表不許乃詔於嶽觀别立道院禄山將亂求還茅山許之既而中原大亂江淮多盗乃東遊㑹稽常於天台剡中徃来與詩人李白孔巢父詩篇酬和逍遙泉石人多從之竟終越中文集二十巻其𤣥綱三篇神仙可學論尤為達識之士所稱凡為文詞理疎通文彩煥發每製一篇人皆傳寫雖李白之放蕩杜甫之壯麗能兼之者其惟筠乎唐禮部尚書權徳輿撰吴尊師傳吴筠字貞節魯中儒士也少通經善屬文舉進士不第性髙潔不伍流俗乃入嵩山依體𤣥先生潘師正為道士傳正之一法苦心鑚仰盡通其術開元中南遊金陵訪道茅山乆之東遊天台筠尤善著述在剡與越中文士為詩酒之㑹所著歌篇傳於京師𤣥宗聞其名遣使徵之既至與語甚悦令待詔翰林帝問以道法對曰道法之精無如五千言其諸枝詞蔓説徒費紙劄爾又問神仙修鍊之事對曰此野人之事當以嵗月功行求之非人主所當適意每與緇黄列坐朝臣啟奏筠之所陳但名教世務而已間之以諷詠以達其誠𤣥宗深重之天寳中李林甫楊國忠用事綱紀日紊筠知天下將亂堅求還嵩山累表不許乃詔於嶽觀别立道院禄山將亂求還茅山許之既而中原大亂江淮多盗乃東遊㑹稽常於天台剡中徃来與詩人李白孔巢父詩篇酬和逍遙泉石人多從之竟終越中文集二十巻其𤣥綱三篇神仙可學論尤為達識之士所稱凡為文詞理疎通文彩煥發每製一篇人皆傳寫雖李白之放蕩杜甫之壯麗能兼之者其惟筠乎唐禮部尚書權徳輿撰
