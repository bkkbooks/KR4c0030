front:
  text: 去亂聲絶淫志無大醉候夜絶明左右取之若電爍而光圓大享夀之徵也久則圓明被體如流星迸芒其道必昌大君曰先扣天鼓伏枕收光澄心瞑目想見太陽太陽在闕門上太隂在丹田外熟寢神靜神集氣正
  hash: sha256:c1f92e5cd0d9ecf758b407de84644f282eef67fb3a55bd07660d59c08a2dbedc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0030_WYG_005-1a, image: WYG1071/WYG1071-0770c.png}
body:
  text: 朝斗章第三歲有三元月有三七齊心端居握固瞑想如到金闕如覩宸容稽首伏拜一如朝天子之儀禮畢戰懼拱聳趨出洗滌煩慮止絶煩慮為齊心然則朝元無時夜䦨於密室對北辰象行此法易感通也庚申章第四常人守此法夜不寐非本法如庚申夜於淨室具香火端居握固先扣天鼓三十六通集神畢次想身中百神皆出具冠劒威儀侍衛於前後左右訖乃引朝太上道君一如朝斗之法行之三年兵虎不能害三尸不敢守夢長材美人遺竒花異果感通之應送夀之祥也修陽德章第五為善無小大皆係於陽為惡無小大皆屬於隂積善滋大則陽氣發而為祥積惡滋深則隂氣作而為禍故希夀之士先憑隂德後迎陽報者即遐齡也大君曰如此之流皆入仙格服餌靈草容壯難老藥則為裏術則為表百神易集形可長保導引元陽章第六百關開通則五藏皆理六府俱淨則邪氣不入天鼓鳴魘穢皆去元氣行津路流通氣液所及骨髓如金神必亨暢導引畢定息鳴天鼓集神乃噓呵呼嘻呬吹之聲無令耳聞久則清氣積於內濁穢之氣消亡矣大君曰丹雖未成神已虛明元陽氣平乃入長生隂忌章第七雷電震雨大風拔樹此乃大怒鬼神皆怖是故拱立稽首凜而兢懼宴息于牀無行夫婦如否者鬼神奪算病則難愈大君曰敬天威怒隂靈皆怖久則隂賊遁死籍除百神扶此之謂登福輿碎禍車習近則主章第八冶容夭夀之階也淫聲伐性之斧也珍肴巵酒亂神之藥也軒冕搢紳賁形之具也此四患靡不知之無能捨之捨之不得謂之行尸升天道逺全生道近故不如習近大君曰神集則靈氣清則輕神集氣清是謂守形是謂全生七曜感通章第九心仰七星之光足履七星之步跡勿重履四十九數回視握固扣鳴天鼓瞑目存想左龍右虎故曰我不尋真真必相隨神得真氣百靈皆護授真氣必遇至人或夢逰海山見龍獸皆白衣天子宫樓御苑是神合形命術成矣然後告元神享夀星天關無礙宗𤣥集别録
  hash: sha256:6746ff6efe862bcc6282d810b09c8c8cdd5dc4afb6fe1fd4575fc667b3d7ce7f
