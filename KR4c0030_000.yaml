  text: 欽定四庫全書集部二
  hash: sha256:12d8190cadcf5eac3a9a3b81ae053c873dee29480bf15c1526bdc2f7417fab40
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0030_WYG_000-1a, image: WYG1071/WYG1071-0723a.png}
body:
  text: 宗玄集别集類一唐提要臣等謹案宗玄集三卷附録元綱論一卷內丹九章經一卷唐吳筠撰筠字貞節華隂人隱於南陽天寶中召至京師請為道士居嵩山復求還茅山東逰會稽往來天台剡中與李白孔巢父酬唱大歷中卒弟子私諡曰宗玄先生新舊唐書皆載隱逸傳此本為浙江鮑氏知不足齋所鈔末有原跋云收入道藏中世無别本然文獻通考云吳筠宗玄先生集十卷前有權德輿序列於别集諸人之次則當時非無傳本此跋題戊申嵗不著年號疑作於通考後也卷首權德輿序稱太原王顔類遺文為三十卷後又有吳尊師亦德輿撰乃言文集二十卷均與文獻通考稱十卷者不合考德輿序稱四百五十篇而此本合詩賦論僅一百十九篇則非完書矣又舊書筠本傳云魯中儒士也新書本傳云華州華隂人德輿序稱華隂人而傳又云魯儒士序稱受正一法於馮尊師上距陶宏景五傳傳又云受正一法於潘體元乃馮之師亦相乖刺考舊書李白傳稱天寶初客逰會稽與道士吳筠隱於剡中而傳乃言祿山將亂求還茅山既而中原大亂江淮多盜乃東逰會稽與詩人李白孔巢父詩篇酬和不知天寶亂後白已因永王璘事流夜郎矣安能與筠同隱此傳殆出於依託序又稱筠卒於大歷十三年卒後二十五歲乃序此集其年為貞元十九年德輿於貞元十七年知禮部貢舉明年真拜侍郎故是年作序系銜云禮部侍郎其文與史合而金丹九章經後又載筠自序一篇題元和戊戌年作戊戌乃元和十三年距所謂先生化去之年又隔四十年後且云元和中逰淮西遇王師討蔡賊吳元濟避亂東嶽遇李謫仙授以內丹九章經殆似囈語然則此序與傳同一偽撰矣據新舊唐書皆有元綱三篇語則卷末所附元綱論三篇自屬筠作至內丹九章經核之以序偽妄顯然以流傳已久姑併録之而辨其抵牾如右乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀宗玄集原序道之為物無不由也無不貫也而况本於玄覽發為至言言而藴道猶三辰之麗天百卉之麗地平夷章大恬淡溫粹飄飄然軼八紘而泝三古與造物者為徒其不至者遺言則華涉理則泥雖辨麗可嘉采真之士不與也宗玄先生吳君其知言者歟先生諱筠字貞節華隂人也年十五篤志於道與同術者隱于南陽倚帝山閎覽古先遐蹈物表芝耕雲卧聲利不入天寶初玄纁鶴板徵至京師用希夷啓沃吻合玄聖請度為道士宅居於嵩陽丘乃就馮尊師齊整受正一之法初梁貞白陶君以此道授升玄王君王君授體玄潘君潘君授馮君自陶君至於先生凡五代矣皆以隂功救物為王者師十三年召入大同殿尋又詔居翰林明皇在宥天下順風祈向乃獻玄綱三篇優詔嘉納志在遐舉纍章乞還以禽魚自况藪澤為樂得請未幾盜汙三川羽衣虛舟泛然東下棲匡廬登會稽浮浙江息天柱隱機埋照順吾靈龜有時放言以暢天理且以園公歌詠於紫芝𢎞景怡恱於白雲故屬詞之中尤工比興觀其自古王化詩與大雅吟步虛詞遊仙雜感之作或遐想古理以哀世道或磅礴萬象用冥環樞稽性命之紀達人事之變大率以嗇神挫鋭為本至於奇采逸響琅琅然若戛雲璈而凌倒景崑閬松喬森然在目近古遊方外而言六義者先生實主盟焉至若總論谷神之妙則有玄綱哀蓬心蒿目之逺於道也則有神仙可學論疏瀹澡雪使無落吾事則有洗心賦岩居賦修胸中之誠而休乎天君則有心目論契形神頌其他操章寓書贊美敘别非道不言言而可行泊然以微妙卓爾而昭曠合為四百五十篇博大真人之言盡在是矣大厯十三歲歲直鶉首止于宣城道觀焚香返真於虛室之中門弟子有邵冀玄者率籲其徒寧神於天柱西麓從其命也冀玄遍得先生之道如稿木止水刳心遺形太原王顔嘗恱先生之風自先生化去二十五歲顔為御史丞類斯遺文為三十篇拜章上獻藏在祕府厥後冀玄得其本以授豫請序引其徑庭庶傳永久别有辨析世惑之論不列於此編至若挺神竒祛物怪告鍊脫之地合肸蠁之符皆備刻於金石者之説今徒采獲斯文以序崖略且俾後學知道者必知言云權德輿序
