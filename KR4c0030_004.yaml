body:
  text: 宗𤣥集别錄唐吴筠撰𤣥綱論上篇明道徳凡九章道徳章第一道者何也虚旡之系造化之根神明之本天地之源其大無外其㣲無内浩曠無端杳冥無對至幽靡察而大明垂光至静無心而品物有方混漠無形寂寥無聲萬象以之生五音以之成生者有極成者必虧生生成成今古不移此之謂道也徳者何也天地所稟隂陽所資經以五行緯以四時牧之以君訓之以師幽明動植咸暢其冝澤流無窮羣生不知謝其功恵加無極百姓不知賴其力此之謂徳也然則通而生之之謂道道固無名焉畜而成之之謂徳徳固無稱焉嘗試論之天地人物靈仙鬼神非道無以生非徳無以成生者不知其始成者不見其終探奥索隠莫窺其宗入有之末出無之先莫究其朕謂之自然自然者道徳之常天地之綱也元氣章第二太虚之先寂寥何有至精感激而真一生焉真一運神而元氣自化元氣者無中之有有中之無曠不可量微不可察氤氲漸著混茫無倪萬象之端兆朕於此於是清通澄朗之氣浮而為天濁滯煩昧之氣積而為地平和柔順之氣結而為人倫錯謬剛戾之氣散而為雜類自一氣之所育播萬殊而種分既涉化機遷變罔窮然則生天地人物之形者元氣也授天地人物之靈者神明也故乾坤統天地精魂御人物氣有隂陽之革神無寒暑之變雖羣動糾紛不可勝紀滅而復生終而復始道徳之體神明之心應感不窮未嘗疲於動用之境矣真精章第三天地不能自有有天地者太極太極不能自運運太極者真精真精自然惟神惟明實曰虚皇髙居九清乃司𤣥化總御萬靈乾以之動坤以之寧寂黙旡為羣方用成空洞之前至虚靡測元和澄正自此而植神真獨化匪惟巨億仰𨽻至尊咸有所職丹臺瑤林以游以息雲漿霞饌以飲以食其動非心其翔非翼聽不以耳聞乎無窮視不以目察乎無極此皆無祖無宗不始不終含和藴慈愍俗哀䝉清濁體異真凡莫同降氣分光聿生人中賢明博達周濟為功為君為長俾物咸通爰歴世紀𤣥勲允充徳掞天壤名書帝宫於是運絶北都命標南府元真乃降是為形主隂氣既落世塵自阻鍊胎易質革穢除腐神形合契白日輕舉所謂反我鄉歸我常與道無疆而孰知其方天稟章第四夫道本無動静而隂陽生焉氣本無清濁而天地形焉純陽赫赫在乎上九天之上無隂也純隂冥冥處乎下九地之下無陽也隂陽混蒸而生萬有生萬有者正在天地之間矣故氣象變通晦明有類陽以明而正其粹為真靈隂以晦而邪其精為魔魅故稟陽靈生者為睿哲資隂魅育者為頑兇睿哲恵和陽好生也頑兇悖戾隂好殺也或善或否二氣均合而生中人三者各有所稟而教安施乎教之所施為中人爾何者睿哲不教而自知頑兇雖教而不移此皆受隂陽之純氣者也亦猶火可滅不能使之寒氷可消不能使之熱理固然矣夫中人為善則和氣應為不善則害氣集故積善有餘慶積惡有餘殃有慶有殃教於是立性情章第五夫生我者道稟我者神而夀夭去留匪由於已何也以性動為情情反於道故為化機所運不能自持也將超跡於存亡之域棲心於自得之鄉道可以為師神可以為友何為其然乎夫道與神無為而氣自化無慮而物自成入於品彚之中出乎生死之表故君子黜嗜慾隳聰明視無色聴無聲恬淡純粹體和神清虚夷忘身乃含至精此所謂返我之宗復與道同與道同則造化莫能移鬼神莫能知而况於人乎超動静章第六夫道至无而生天地天動也而北辰不移含氣不虧地静也而東流不輟興雲不竭故静者天地之心也動者天地之氣也心静氣動所以覆載而不極是故通乎道者雖翺翔宇宙之外而心常寧雖休息毫釐之内而氣自運故心不寧則無以同乎道氣不運則無以存乎形形存道同天地之徳也是以動而不知其動者超乎動者也静而不知其静者出乎静者也故超乎動者陽不可得而推出乎静者隂不可得而移隂陽莫能變而况於萬物乎故不為物之所誘者謂之至静至静然後能契於至虚虚極則明明極則瑩瑩極則徹徹者雖天地之廣萬物之殷而不能逃於方寸之鑒矣同有無章第七夫道包億萬之數而不為大貫秋毫之末而不為小先虚無而不為始後天地而不為終昇積陽而不為明淪重隂而不為晦本無神也虚極而神自生本無氣也神運而氣自化氣本無質凝委而成形形本無情動用而虧性形成性動去道彌逺故溺於生死遷於隂陽不能自持非道存而亡之也故道能自無而生於有豈不能使有同於無乎有同於無則有不滅矣故生我者道滅我者情茍忘其情則全乎性性全則形全形全則氣全氣全則神全神全則道全道全則神王神王則氣靈氣靈則形超形超則性徹性徹則返覆流通與道為一可使有為無可使虚為實吾將與造化者為儔奚死生之能累乎化時俗章第八道徳者天地之祖天地者萬物之父帝王者三才之主然則道徳天地帝王一也而有今古澆淳之異堯桀治亂之殊者何也夫道徳無興衰人倫有否泰古今無變易性情有推移故運將泰也則至陽真精降而為主賢良輔而姦邪伏矣時將否也則太隂純精升而為君姦邪弼而賢良隠矣天地之道隂陽之數故有治亂之殊也所以古淳而今澆者亦猶人幼愚而長慧也嬰兒未孩則上古之含純粹也漸有所辯則中古之尚仁義也成童可學則下古之崇禮智也壯齒多欲則季世之競浮偽也變化之理時俗之宜故有淳澆之異也覈其所以源其所由子以習學而性移人以隨時而朴散雖然父不可不教於子君不可不治於人教子在乎義方治人在乎道徳義方失則師友不可訓道徳䘮則禮樂不可理雖加以刑罰益以鞭楚難制於姦臣賊子矣是以示童䝉以無誑則保於忠信化時俗以純素則安於天和故非執道徳以撫人者未聞其至理者也眀本末章第九夫仁義禮智者帝王政治之大綱也而道家獨云遺仁義薄禮智者何也道之所尚存乎本故至仁合天地之徳至義合天地之宜至禮合天地之容至智合天地之辯皆自然所稟非企羨可及矯而效之斯為偽矣偽則萬詐萌生法不能理也所以貴淳古而賤澆季内道徳而外仁義先素樸而後禮智將敦其本以固其末猶根深則條茂源濬則流長非棄仁義薄禮智也故道䘮而猶有徳徳衰而猶有仁仁虧而猶有義義缺而猶有禮禮壊則繼之以亂而智適足以憑陵天下矣故禮智者制亂之大防也道徳者撫亂之宏綱也然則道徳為禮之本禮智為道之末執本者易而固持末者難而危故人主以道為心以徳為體以仁義為車服以禮智為冠冕則垂拱而天下化矣若尚禮智而忘道徳者所謂有容飾而無心靈則雖朝乾夕惕而天下敝矣故三皇化之以道五帝撫之以徳三王理之以仁義五伯率之以禮智故三皇為至治五伯隣至亂故捨道徳而專任禮智者非南面之術是以先明道德道德明則禮智薄矣老子曰禮者忠信之薄而亂之首以智治國國之賊不以智治國國之福此謂禮虧則亂智變則詐故塞其亂源而絶其詐根而揚雄班固之儔咸以道家輕仁義薄禮智而專任清虚者盖世儒不達𤣥聖之深㫖也中篇辯法教凡一十五章神道設教章第十九𤣥之初二象未搆靈風集妙空洞凝華寶章結於混成玉字標於獨化挺乎有無之際煥乎𤣥黄之先日月得之以照臨乾坤資之以覆載於是无上虚皇命元始天王編之於金簡次之於玉章初秘上元末流下土降鑒有道乃錫斯文故伏羲受圖軒轅受符髙辛受天經大禹受洛書神道設教兆於兹矣又𤣥元愍俗厯為帝師人倫澆浮則陳道徳以示朴鬼神雜擾則演盟威以盪邪爰及蘓茅周王裴魏楊許莫不躬接𤣥聖親傳寳經故西臺無隠於靈文東華不秘於真訣是以龍章雲篆漸降人間師資相承經法彌廣然可以周覽難以盡行何者以一人之心兼累聖之道神疲形倦莫究其㣲故周覽以絶疑約行以取妙則不虧於修習無廢於閒和道在至精靡求其慱爾學則有序章第十一道雖無方學則有序故始於正一次於洞神棲於靈寶息於洞真皆以至静為宗精思為用齋戒為務慈恵為先故非至静則神不凝非精思則感不徹非齋戒則真不應非慈恵則功不成神凝感徹真應功成者是謂陟初仙之階矣然後吐納以鍊藏導引以和體怡神以寶章潤骨以瓊醴皆承奉師訣研味真奥則氣液通暢形神合同不必金丹玉芝可俟雲軿羽盖矣若獨以嘘吸為妙屈伸為要藥餌為事雜術為利者可謂知養形不知寳神矣不知寳神者假使夀同龜鶴終無冀於神仙矣陽勝則仙章第十二陽與隂并而人乃生魂為陽神魄為隂靈結胎運氣育體搆形然勢不俱全全則各返其本故隂勝則陽竭而死陽勝則隂銷而仙柔和慈善貞清者陽也剛狠嫉惡婬濁者隂也心澹而虚則陽和襲意躁而欲則隂氣入明此二者制之在我陽勝隂伏則長生之漸也漸也者陟道之始不死之階也虚明合元章第十三道不欲有心有心則真氣不集又不欲苦忘心苦忘心則客邪來舍在於平和恬澹澄清精㣲虚明合元有感必應應而勿取真偽斯分故我心不傾則物無不正動念有屬則物無不邪邪正之來在我而已雖所尚虚漠遺形絶慮非精感遐徹則不能通𤣥致真故上學之士怠於存念者隂尸之氣勝也忻於勤銳者陽和之神勝也一怠一勤者其戰未决也决之者在於刻節勵操務違懈慢之意使精專無輟於斯須乆於其事者則尸銷而神王神王者謂之陽勝陽勝者道其隣乎以陽鍊隂章第十四陽火也隂水也氷炭不同器勝負各有所歸道俗反其情人各有所鍊衆人則以隂鍊陽道者則以陽鍊隂隂鍊陽者自壮而得老自老而得衰自衰而得耄自耄而得疾自疾而得死陽鍊隂者自老而反嬰自濁而反清自衰而反盛自粗而反精自疾而反和自夭而反夀漸合真道而得仙矣是以有纎毫之陽不盡者則未至於死有錙銖之隂不㓕者則未及於仙仙者超至陽而契真死者淪太隂而為鬼是謂各從其類所以含元和抱淳一吐故納新屈伸導引精思静黙瀟灑無欲者務以陽靈鍊革隂滯之氣使表裏虛白洞合至真乆於其事者仙豈逺乎哉形動心静章第十五夫形動而心静神凝而跡移者無為也閒居而神擾恭黙而心馳者有為也無為則理有為則亂雖無為至易非至明者不可致也夫天地晝亦無為夜亦無為無為則一而理亂有殊者何哉晝無為以明故衆陽見而羣隂伏夜無為以晦故羣隂行而衆陽息是以主明而無為者則忠良進姦佞匿而天下治也主闇而無為者則忠良隠姦佞熾而天下亂也故達者之無為以慧蔽者之無為以昬慧則通乎道昏則同乎物道與物俱無為奚可以一致焉故至人雖貴乎無為而不可不察也察而無為者真可謂無為也神清意平章第十六上學之士時有髙興逺寄陶然於自得之境為真仙可接霄漢可昇者神之王也雖曰神王猶恐陽和之氣發泄隂邪之氣乗襲耳可入静室夷心抑制所起静黙專一則神不散而陽靈全慎無恣其樂康之情以致隂邪之來耳古人所謂樂往則哀來陽衰則隂勝若有時躁競而煩悖者此乃形中諸魄為陽靈之氣所鍊隂尸積滯將散故擾于絳宫之真矣可入室静慮存一握固激其滓濁候神清氣平然後省已悔過務令自新則轉合於虚静之途此亦洗心之一術爾行清心貞章第十七行欲清心欲貞言勿過乎行行無愧乎心則遊於四達之衢四達之衢者渉道之通逵也行之不已則天地愛之神明祐之凶横無由加鬼神不能擾若言清而行濁名潔而跡汚雖醜蔽於外而心慙於内心慙於内者天地疾之神明殛之雖力强於道不可致也故寧受人之毁無招天之譴人毁猶可弭天譴不可逭也真人為儔章第十八道之所至忌者婬殺隂賊此誠易戒至於小小喜怒是非可否人之常情甚難慎也都不欲有纎芥之事闗乎方寸之中慮静神開則邪氣不能入我志不擾則真人為儔又好譽而憎毁者賢達之所不免然審已無善而獲譽者不祥省躬無疵而獲謗者何傷以此論之得失在乎已而靡由其他故泰然忘情美惡不動乎衷者至人哉至人哉仁明貞静章第十九夫仁明而貞静博達而英秀者皆天人分氣降生以濟時利物也積世功備則丹臺著明元貞潛運於上𤣥正氣密集於關府自然魄鍊而尸滅神凝而體清隂滓都銷則合形而輕舉故古之仙者未始非天人也使行尸同其所好不亦難乎有積修累行而不獲昇舉者何也前功未著也有不因修習而自得仙者往行克充也夫功無虚搆善不徒施不可見為而不得則於我生怠覩自然羽化則謂功不由人皆失之逺矣立功改過章第二十功欲隂過欲陽功隂則能全過陽則可滅功不全過不滅仙籍何由書長生非可冀然功不在大遇物斯拯過不在小知非則悛不必馳驟於立功奔波於改過過在改而不復為功惟立而不中倦是謂日新其徳自天祐之若爾者何必八節三元言功悔過神真明察固其常焉又謝過祈恩務在精誠懇志注心於三清之上如面奉金闕之前不必屈伏形體宣通言辭若徒加拜跪叩搏誦課平常之文者可謂示人以小善實未為感激之𢎞規耳制惡興善章第二十一陽之精曰魂與神隂之精曰尸與魄神勝則為善尸强則為惡制惡興善則理忘善縱惡則亂理乆則尸滅而魄鍊亂久則神逝而魂銷故尸滅魄鍊者神與形合而為仙神逝魂銷者尸與魄同而為鬼自然之道也虚白其志章第二十二神魂好潔尸魄好穢常欲虚白其志澡雪其形則神魂樂康尸魄鍊滅神康尸滅者日益清爽雖未輕舉吾必謂之仙矣又悲哀感恚者與隂為徒歡恱欣康者與陽為徒故心悲則隂集志樂則陽散不悲不樂恬澹無為者謂之元和非元和無以致其道也委心任運章第二十三夫目以妖豔為華心以聲名為貴身好輕鮮之飾口欲珍奇之味耳歡妙美之聲鼻恱芳馨之氣此六者皆敗德傷性秖以伐其靈根者也故有之即可逺無之不足求惟衣與食人之所切亦務道者之一弊耳然當委心任運未有不給其所用且天地之生禽獸也猶覆之以羽毛供之以蟲粒而况於人乎必在忘其所趣任之自然爾虚凝静息章第二十四覺與陽合寐與隂併覺多則魂强寐久則魄壮魂强者生之徒魄壯者死之徒若餐元和徹滋味使神清氣爽至於晝夜不寐唯虚凝而静息者善無以加焉下篇析疑滯凡九章㑹天理章第二十五或問曰夫人之心久任之則浩蕩而忘返頓棲之則超躍乎無垠任之則弊乎我性棲之則勞乎我神使致道者奚方而静愚應之曰性本至凝物感而動習動滋久胡能遽寧既習動而播遷可習静而恬晏故善習者寂而有裕不善習者煩而無功是以將躁而制之以寧將邪而閑之以貞將求而抑之以捨將濁而澄之以清優哉游哉不欲不營然後以𤣥虚為境域以澹漠為城闕以太和為宫觀以寂照爲日月惟精惟㣲不廢不越行如是息如是造次於是逍遙於是習此久者則物冥乎外神鑒於内不思静而已静匪求泰而彌泰即動寂兩忘而天理自會矣故履霜乃堅氷之始習静為契道之階古人豈不云乎積習生常其斯之謂歟畏神道章第二十六或問曰人有善惡天地神明豈悉知之乎愚應之曰是何言歟是何言歟夫心者神靈之府神棲于其間茍心謀之即神知之神知之則天地神明悉知之矣未有為善惡不謀于心者既謀於心則神道所察無逃於毫分無逃於毫分則福善禍淫其不差矣曰何為顔生夭冉子疾盜跖夀莊蹻富楚穆霸田恒昌乎愚應之曰天道逺人道邇報應之効遲速難量故君子遭命小人有幸然吉凶糾纒豈止於一形乎故經曰天網恢恢疎而不失又曰其事好還則報應之道可明矣何必一切徵之於目前乎率性凝神章第二十七或問曰神主於静使心有所欲何也愚應之曰神者無形之至靈者也神稟於道静而合乎性人稟於神動而合乎情故率性則神凝馳情則神擾凝乆則神止擾極則神遷止則生遷則死皆情之所移非神之所使曰然則變性為情者為誰乎曰内則隂尸之氣所悖外則聲色之態所誘積習浩蕩不能自寧非神之所欲動也道反於俗章第二十八或問曰人情之所至愛者皆道家之所至忌何也愚應之曰夫福與夀人之所好禍與夭人之所惡不知至愛者招禍致夭無欲之介福永夀若斯而過求自害何迷之甚乎且燕趙豔色性之寃也鄭魏淫聲神之諠也珍饌㫖酒心之昏也搢紳紱冕體之煩也此四者捨之則静取之則擾忘之則夀躭之則夭故為道家之至忌也專精至道章第二十九或問曰古之學仙者至多而得道者至少何也愚應之曰常人學道者千而知道者一知道者千而志道者一志道者千而專精者一專精者千而勤久者一是以學者衆而成者寡也若知道者能絶俗絶俗者能立志立志者能專精專精者能勤久未有學而不得者也曰然則理世者絶望於仙乎曰不然若特稟真氣大庇羣生者則無妨於理世若中人好道志慕輕舉必藉於棲閑故太昊襲氣母軒轅昇雲軿顓頊處𤣥宫文命遊紫府斯皆撫俗而得道者也若乃𤣥元寄柱史南華吏漆園王喬莅葉縣方朔登金門此亦佐時而得道者也又仙欲隠密道貴無名或昭其蹤或其跡不可以一途而察不可以一理而推按真誥及抱朴子元始上仙記咸云自古至忠至孝至貞至亷有大功及物者皆有所得不同常流堯舜周孔伊吕昔諸聖賢皆上擢仙職斯所謂死而不亡者夀又白華自以隨世畏死而希仙沒為靈官其骨不朽功充之後靈肉附骸返魂還形儵忽輕舉若爾者則片善不失而况專以神仙為務者乎長生可貴章第三十或問曰道之大㫖莫先乎老莊老荘之言不尚仙道而先生何獨貴乎仙者也愚應之曰何謂其不尚乎曰老子云死而不亡者夀又曰子孫祭祀不輟荘子曰孰能以死生為一條又曰聖人以形骸為逆旅此其證乎愚答曰𤣥聖立言為中人爾中人入道不必皆仙是以教之先理其性理其性者必平易其心心平神和而道可冀故死生於人最大者也誰能無情情動性虧秪以速死令其當生不恱將死不懼翛然自適憂樂兩忘則情滅而性在形殁而神存猶愈於形性都亡故有齊死生之說斯為至矣何為乎不尚仙者也夫人之所以死者形也其不亡者性也聖人所以不尚形骸者乃神之宅性之具也其所貴者神性爾若以死為懼形骸為真是修身之道非修真之妙矣老子曰深根固蔕長生久視之道又曰谷神不死莊子曰千載厭世去而上仙乗彼白雲至於帝鄉又曰故我修身千二百歳而形未嘗衰又曰乗雲氣馭飛龍以遊四海之外又曰人皆盡死而我獨存又曰神将守形形乃長生斯則老莊之言長生不死神仙明矣曷謂無乎又道徳經南華論多明道以訓俗敦本以静末神仙之奥存而不議其幽章隠書鍊真妙道秘于三洞非賢不傳故輕泄者獲戾於天官欽崇者紀名於𤣥録殃慶逮乎九祖昇沈繫乎一身不可使行尸之徒悉聞悉見耳道無棄物章第三十一或問曰物自道生道無棄物何獨得道者靈長失道者滅亡乎愚應之曰夫龍之與魚同育於水明之與暗俱生於道龍則興雲施雨出有入無魚則在藻而樂失泉而枯龍則得水之妙而能化於水魚不得水之妙而不能化於水也上士則棲神鍊氣逸於霄漢之上下士則伐性損夀淪乎幽壤之下上士得道之妙而能化于道下士不得道之妙而不能化於道也故魚不知水之生乎已而棄之非水之棄魚也人不知道之生乎已而棄之非道之棄人也或曰龍魚異質明暗殊稟安能使魚化於水凡化於道乎愚答曰若魚能潛深淵匿幽穴不貪餌及其大也即奮鱗激鬛超吕梁而為龍矣人能遊崆峒息淡泊絶嗜慾及其至也即合㣲契虚蹈真境而為仙矣所恨藏身不密保神不固而水之與道豈負魚之與人哉明取捨章第三十二或問曰仙者人之所至美者也死者人之所至惡者也而厯代之君子罔有不知而從俗者至多習仙者至少何也愚應之曰此有二理一者所稟之氣非髙即所希之志難廣故溺於近務忘乎逺見為聲名所汩嗜慾所昏終縶伏於世網竟無蹈於真域二者雖稟氣蕭遐神襟秀邁而濟物之功未備登仙之路猶逺是以遲迴人爵未解帝懸耳若夙勛已著名入丹臺則超跡絶塵物所不能累也又問曰仙必有骨無骨不可學仙奈何愚應之曰夫工者必因其材而施乎巧學者必有其骨而志乎道故氷不可鏤愚不可仙自然之理也所以神不清骨不峻者皆非稟陽靈之氣也非稟陽靈之氣者必無慕仙之心也茍有慕仙之心者未有不夙挺夫仙骨者也曰然則有仙骨不修而可致乎曰有骨而不學者亦如有材而無工故金藏於鑛也不冶而為石道在於人也不鍊而為凡雖無骨而不仙亦不可恃骨而待輕舉也以有契無章第三十三或問曰道本無象仙貴有形以有契無理難長久曷若得性遺形者之妙乎愚應之曰夫道至虚極也而含神運氣自無而生有故空洞杳冥者大道無形之形也天地日月者大道有形之形也以無係有以有含無故乾坤永存而仙聖不滅故生者天地之大徳也所以見六合之廣三光之明者為吾有形也若一從淪化而天地萬物盡非吾有即死者人倫之荼毒也是以鍊凡至於仙鍊仙至於真錬真合乎妙合妙同乎神神與道合即道為我身所以昇玉京遊金闕能有能無不終不殁何為理難長久乎若獨以得性為妙不知鍊形為要者所謂清靈善爽之鬼何可與髙仙為比哉曰然則古有仙矣胡為既隠而不復見乎曰清濁殊流真凡異境安可得而見耶雖然令威千載而暫歸𤣥元至今而屢降何為而不復見乎曰然則今之仙者為誰乎曰自我唐以來可略而言矣劉慶雲舉於蜀土韋俊龍騰於嵩陽道合蟬蛻於太一洞𤣥骨飛於冀方其餘晦迹遁世得道輕舉者不可勝紀此皆接於聞見詎可誣而蔽之盖知道者稀故得仙者寡至音不娱於俚耳悲夫南統大君内丹九章經賢愚異實章第一屈身問道志騰雲漢之外上士也伐夀損性甘心於幽壤之下愚䝉也大君曰人本與天地同生於虚無何天地則能齊其夀而人不能存其形是道不負人人負於道也賢愚異實清濁殊途故吾之道非昇天之道集神以為道神集則内丹成存其形神光章第二常人亦以此候吉凶黄吉白凶青憂黑死餘候則不令知之者也
